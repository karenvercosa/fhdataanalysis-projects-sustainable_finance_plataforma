sonar.projectKey=sustainable_finance_plataforma
sonar.projectName=Sustainable Finance Plataforma
sonar.projectVersion=1.0

# Fontes e testes
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# Exclusões (build, assets, tipos gerados, configs)
sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/coverage/**,\
  **/public/**,\
  **/*.d.ts,\
  **/prisma/**,\
  **/cypress/**,\
  src/test/**

# Exclusões de cobertura
sonar.coverage.exclusions=\
  **/*.test.ts,\
  **/*.test.tsx,\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/__tests__/**,\
  src/test/**,\
  src/types/**,\
  src/components/ui/**,\
  src/middleware.ts
  
# Relatório de cobertura gerado pelo Vitest (lcov)
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Servidor local (token passado em runtime pelo start.sh)
sonar.host.url=http://localhost:9000

# Encoding
sonar.sourceEncoding=UTF-8
